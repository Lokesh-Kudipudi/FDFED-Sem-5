name: CD Pipeline - Backend (Render)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deployment
        if: github.repository == 'Lokesh-Kudipudi/FFSD' || github.repository != '' # Ensuring it runs, but optionally limit to a specific repo
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "Error: RENDER_DEPLOY_HOOK secret is not set. Deployment skipped."
            exit 1
          fi
          echo "Triggering Render deployment hook..."
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
